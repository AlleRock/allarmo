<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ALLARMO v4.2 - High Contrast</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ALLARMO">
    
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/AlleRock/allarmo/main/icona.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #05070a;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Nav Bar */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: calc(70px + env(safe-area-inset-bottom));
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 2000;
        }

        .nav-item {
            color: #666; font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
            display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;
        }

        .nav-item.active { color: var(--accent-green); }

        /* Pages */
        .page {
            display: none; padding: 20px; width: 100%; max-width: 480px; margin: 0 auto;
            padding-bottom: 120px; animation: fadeIn 0.3s ease;
        }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { text-align: center; margin-bottom: 30px; padding-top: env(safe-area-inset-top); }
        h1 { font-weight: 800; font-size: 2.4rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { font-size: 0.7rem; letter-spacing: 4px; color: var(--accent-green); text-transform: uppercase; font-weight: 800; }

        /* Cards */
        .card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 30px; padding: 25px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.7rem; font-weight: 800; color: #a1a1aa; text-transform: uppercase; }
        input { width: 100%; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; color: white; margin-bottom: 20px; outline: none; }
        
        #save-btn { width: 100%; background: #fff; border: none; border-radius: 12px; padding: 18px; color: #000; font-weight: 800; text-transform: uppercase; }

        /* Timer Items - Correzione Leggibilità */
        .timer-item {
            background-color: #111; background-size: cover; background-position: center;
            border: 1px solid var(--glass-border); border-radius: 26px; margin-bottom: 25px;
            overflow: hidden; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .timer-header { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 100%);
            padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; 
        }

        .timer-display { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 1.7rem; 
            padding: 45px 10px; 
            text-align: center;
            font-weight: 800;
            /* Doppia ombra per leggibilità suprema */
            text-shadow: 0px 2px 10px rgba(0,0,0,1), 0px 0px 20px rgba(0,0,0,0.8);
        }
        
        .btn-action { background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 0.65rem; padding: 8px 12px; border-radius: 8px; font-weight: 800; text-transform: uppercase; backdrop-filter: blur(5px); }
        .btn-edit { background: #3b82f6; } 
        .btn-del { background: var(--accent-red); }

        .btn-ios { 
            width: 100%; 
            background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(10px);
            border: none; 
            color: var(--accent-green); 
            padding: 14px; 
            font-weight: 800; 
            font-size: 0.75rem;
            letter-spacing: 1px;
            border-top: 1px solid var(--glass-border);
        }

        /* Fullscreen Correzione */
        .modal-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; background-size: cover; background-position: center; z-index: 3000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .modal-view.active { display: flex; }
        .close-x { position: absolute; top: 50px; right: 20px; color: white; font-size: 2rem; background: rgba(0,0,0,0.6); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); }

        .future { color: var(--accent-green); } .past { color: var(--accent-red); }
    </style>
</head>
<body>

    <div id="page-setup" class="page active">
        <header>
            <h1>ALLARMO</h1>
            <div class="subtitle">Persistenza Immersiva</div>
        </header>

        <section class="card">
            <label>NOME EVENTO</label>
            <input type="text" id="name" placeholder="Es. Prossimo Step" autocomplete="off">
            <label>SCADENZA</label>
            <input type="datetime-local" id="date">
            <label>FOTO SFONDO</label>
            <input type="file" id="image-input" accept="image/*" style="margin-bottom:20px; color:#fff;">
            <button id="save-btn" onclick="handleSave()">Attiva Monitoraggio</button>
        </section>

        <section class="card" style="padding: 15px;">
            <label>Power Tools</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-action" onclick="exportJSON()" style="padding: 15px;">Export JSON</button>
                <button class="btn-action" onclick="document.getElementById('import-file').click()" style="padding: 15px;">Import JSON</button>
            </div>
            <input type="file" id="import-file" style="display:none" onchange="importJSON(event)">
        </section>
        
        <footer style="opacity: 0.3; font-size: 0.6rem; text-align: center;">© 2026 - ARCHITECTED BY MASTRO PROGRAMMO</footer>
    </div>

    <div id="page-monitor" class="page">
        <header>
            <div class="subtitle" style="margin-bottom: 20px;">Live Monitoring</div>
        </header>
        <div id="list"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" id="nav-setup" onclick="switchPage('setup')">
            <span>⚙️</span>
            <span>Setup</span>
        </div>
        <div class="nav-item" id="nav-monitor" onclick="switchPage('monitor')">
            <span>⏱️</span>
            <span>Timer</span>
        </div>
    </nav>

    <div id="modal-view" class="modal-view">
        <button class="close-x" onclick="closeModal()">×</button>
        <div id="modal-title" style="font-size:2rem; font-weight:800; text-align:center; padding: 0 20px; text-shadow: 0 4px 15px #000;"></div>
        <div id="modal-display" style="font-family: 'JetBrains Mono', monospace; font-size:3rem; text-shadow: 0 4px 20px #000; font-weight: 800;"></div>
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const STORAGE_KEY = 'allarmo_v4_2';
        let timers = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let activeId = null;
        let audioEnabled = false;
        let editingId = null;

        function sync() { localStorage.setItem(STORAGE_KEY, JSON.stringify(timers)); }

        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            document.getElementById('nav-' + page).classList.add('active');
        }

        async function silentPermission() {
            if(!audioEnabled) {
                const beep = document.getElementById('beep');
                try { await beep.play(); beep.pause(); beep.currentTime = 0; audioEnabled = true; Notification.requestPermission(); } catch (e) {}
            }
        }

        function handleSave() {
            silentPermission();
            const nIn = document.getElementById('name'), dIn = document.getElementById('date'), iIn = document.getElementById('image-input');
            if(!nIn.value || !dIn.value) return alert("Dati incompleti!");
            if (iIn.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_W = 800; let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX_W) { h *= MAX_W/w; w = MAX_W; } } else { if (h > MAX_W) { w *= MAX_W/h; h = MAX_W; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        finalizeSave(nIn.value, dIn.value, canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(iIn.files[0]);
            } else { finalizeSave(nIn.value, dIn.value, editingId ? timers.find(t => t.id === editingId).image : null); }
        }

        function finalizeSave(n, d, img) {
            if (editingId) {
                const idx = timers.findIndex(t => t.id === editingId);
                timers[idx] = { ...timers[idx], name: n, target: new Date(d).getTime(), targetISO: d, image: img, fired: false };
                editingId = null; document.getElementById('save-btn').innerText = "Attiva Monitoraggio";
            } else { timers.push({ id: Date.now(), name: n, target: new Date(d).getTime(), targetISO: d, image: img, fired: false }); }
            sync(); render(); switchPage('monitor');
            document.getElementById('name').value = ''; document.getElementById('date').value = ''; document.getElementById('image-input').value = '';
        }

        function editTimer(id, e) {
            e.stopPropagation();
            const t = timers.find(x => x.id === id);
            editingId = id;
            document.getElementById('name').value = t.name;
            document.getElementById('date').value = t.targetISO;
            document.getElementById('save-btn').innerText = "Salva Modifiche";
            switchPage('setup');
        }

        function deleteTimer(id, e) { e.stopPropagation(); if(confirm("Eliminare?")) { timers = timers.filter(t => t.id !== id); sync(); render(); } }

        function openModal(id) { activeId = id; const t = timers.find(x => x.id === id); const m = document.getElementById('modal-view'); document.getElementById('modal-title').innerText = t.name; m.style.backgroundImage = t.image ? `url(${t.image})` : 'none'; m.classList.add('active'); }
        function closeModal() { activeId = null; document.getElementById('modal-view').classList.remove('active'); }

        function render() {
            const l = document.getElementById('list');
            if (timers.length === 0) { l.innerHTML = '<div style="text-align:center; opacity:0.3; margin-top:50px;">Nessun timer attivo</div>'; return; }
            l.innerHTML = timers.map(t => `
                <div class="timer-item" style="background-image: ${t.image ? `url(${t.image})` : 'none'}" onclick="openModal(${t.id})">
                    <div class="timer-header">
                        <span style="font-weight:800; font-size:0.85rem; text-shadow: 0 2px 4px #000;">${t.name}</span>
                        <div style="display:flex; gap:8px;">
                            <button class="btn-action btn-edit" onclick="editTimer(${t.id}, event)">Edit</button>
                            <button class="btn-action btn-del" onclick="deleteTimer(${t.id}, event)">×</button>
                        </div>
                    </div>
                    <div class="timer-display" id="clock-${t.id}">--:--:--:--</div>
                    <button class="btn-ios" onclick="downloadICS('${t.name}','${t.targetISO}'); event.stopPropagation();">SYNC CALENDAR</button>
                </div>
            `).join('');
        }

        function tick() {
            const now = Date.now();
            timers.forEach(t => {
                const diff = t.target - now, isPast = diff < 0, abs = Math.abs(diff);
                const d = Math.floor(abs/86400000), h = Math.floor((abs%86400000)/3600000).toString().padStart(2,'0'), m = Math.floor((abs%3600000)/60000).toString().padStart(2,'0'), s = Math.floor((abs%60000)/1000).toString().padStart(2,'0');
                const str = `${isPast ? '+ ' : '- '}${d}D ${h}H ${m}' ${s}"`;
                const clk = document.getElementById(`clock-${t.id}`);
                if(clk) { clk.innerText = str; clk.className = `timer-display ${isPast ? 'past' : 'future'}`; }
                if(activeId === t.id) { document.getElementById('modal-display').innerText = str; document.getElementById('modal-display').className = `timer-display ${isPast ? 'past' : 'future'}`; }
                if(isPast && !t.fired) { if(audioEnabled) document.getElementById('beep').play(); t.fired = true; sync(); }
            });
        }

        function exportJSON() { const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(timers)); const link = document.createElement('a'); link.setAttribute('href', dataUri); link.setAttribute('download', 'allarmo_backup.json'); link.click(); }
        function importJSON(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { try { const imported = JSON.parse(e.target.result); if (Array.isArray(imported)) { timers = imported; sync(); render(); alert("Importato!"); } } catch (err) { alert("Errore!"); } }; reader.readAsText(file); }
        function downloadICS(n, dS) { const date = new Date(dS), s = date.toISOString().replace(/-|:|\.\d+/g, ""), e = new Date(date.getTime() + 60000).toISOString().replace(/-|:|\.\d+/g, ""), ics = ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",`SUMMARY:ALLARMO: ${n}`,`DTSTART:${s}`,`DTEND:${e}`,"BEGIN:VALARM","TRIGGER:-PT0M","ACTION:DISPLAY","END:VALARM","END:VEVENT","END:VCALENDAR"].join("\r\n"); const blob = new Blob([ics], { type: "text/calendar" }); const link = document.createElement("a"); link.href = window.URL.createObjectURL(blob); link.download = `${n}.ics`; link.click(); }

        setInterval(tick, 1000);
        render();
    </script>
</body>
</html>
