<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ALLARMO - Persistenza Totale</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ALLARMO">
    
    <link rel="apple-touch-icon" href="icona.png">
    <link rel="manifest" href="manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #05070a;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --modal-bg: #000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(239, 68, 68, 0.05) 0%, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: env(safe-area-inset-top);
        }

        h1 { 
            font-weight: 800; 
            font-size: 2.2rem; 
            letter-spacing: 0.1em; 
            margin: 0; 
            color: #fff;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: var(--accent-green);
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 5px;
            opacity: 0.8;
        }

        .status-bar {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }

        .input-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 25px;
        }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.65rem; 
            font-weight: 800; 
            color: #94a3b8; 
            text-transform: uppercase; 
        }

        input[type="text"], input[type="datetime-local"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px;
            color: white;
            font-size: 16px;
            margin-bottom: 18px;
            outline: none;
        }

        button {
            width: 100%;
            background: #fff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            color: #000;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .timer-item {
            background-color: #111;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            margin-bottom: 18px;
            overflow: hidden;
            cursor: pointer;
        }

        .timer-item-overlay {
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 100%);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .timer-display { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 1.7rem; 
        }
        
        .future { color: var(--accent-green); }
        .past { color: var(--accent-red); }

        .calendar-sync {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            font-size: 0.6rem;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .modal-view {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--modal-bg);
            background-size: cover;
            background-position: center;
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .modal-view.active { display: flex; }

        footer { 
            margin-top: auto; padding: 30px; opacity: 0.5; font-size: 0.7rem; text-align: center; 
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ALLARMO</h1>
            <div class="subtitle">Persistenza Immersiva</div>
        </header>

        <div id="setup-trigger" class="status-bar" onclick="setupPermissions()" style="color: var(--accent-red); border-color: var(--accent-red);">
            SBLOCCA AUDIO E NOTIFICHE
        </div>

        <section class="input-card">
            <label>Identificativo</label>
            <input type="text" id="name" placeholder="Es. Visita Medica" autocomplete="off">
            
            <label>Data e Ora Scadenza</label>
            <input type="datetime-local" id="date" required>
            
            <label>Immagine (Opzionale)</label>
            <input type="file" id="image-input" accept="image/*" style="margin-bottom: 18px; color: #94a3b8; font-size: 0.8rem;">

            <button onclick="handleSave()">Attiva Monitoraggio</button>
        </section>

        <div id="list"></div>
    </div>

    <div id="modal-view" class="modal-view">
        <button onclick="closeModal()" style="position:absolute; top:40px; right:20px; background:none; border:none; color:white; font-size:2.5rem;">×</button>
        <div id="modal-title" style="font-size: 1.8rem; font-weight: 700; margin-bottom: 20px; text-align:center; padding: 0 20px;"></div>
        <div id="modal-display" style="font-family: 'JetBrains Mono', monospace; font-size: 3rem;"></div>
    </div>

    <footer>
        &copy; 2026 - CREATED BY <span style="color:var(--accent-green); font-weight:bold;">MASTRO PROGRAMMO</span>
    </footer>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const STORAGE_KEY = 'allarmo_master_2026';
        let timers = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let activeId = null;
        let audioEnabled = false;

        function sync() { localStorage.setItem(STORAGE_KEY, JSON.stringify(timers)); }

        async function setupPermissions() {
            const beep = document.getElementById('beep');
            try {
                await beep.play();
                beep.pause();
                beep.currentTime = 0;
                audioEnabled = true;
                await Notification.requestPermission();
                
                const btn = document.getElementById('setup-trigger');
                btn.innerText = "AUDIO E NOTIFICHE ATTIVI";
                btn.style.color = "var(--accent-green)";
                btn.style.borderColor = "var(--accent-green)";
            } catch (e) { console.log(e); }
        }

        // Funzione per generare e scaricare file ICS per iPhone
        function downloadICS(name, dateStr) {
            const date = new Date(dateStr);
            const start = date.toISOString().replace(/-|:|\.\d+/g, "");
            const end = new Date(date.getTime() + 1000 * 60 * 15).toISOString().replace(/-|:|\.\d+/g, "");
            
            const icsData = [
                "BEGIN:VCALENDAR",
                "VERSION:2.0",
                "BEGIN:VEVENT",
                `SUMMARY:ALLARMO: ${name}`,
                `DTSTART:${start}`,
                `DTEND:${end}`,
                "DESCRIPTION:Promemoria creato da ALLARMO",
                "BEGIN:VALARM",
                "TRIGGER:-PT0M",
                "ACTION:DISPLAY",
                "DESCRIPTION:SVEGLIA!",
                "END:VALARM",
                "END:VEVENT",
                "END:VCALENDAR"
            ].join("\r\n");

            const blob = new Blob([icsData], { type: "text/calendar;charset=utf-8" });
            const link = document.createElement("a");
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute("download", `${name}.ics`);
            link.click();
        }

        function handleSave() {
            const n = document.getElementById('name');
            const d = document.getElementById('date');
            const i = document.getElementById('image-input');
            
            if(!n.value || !d.value) return;

            const file = i.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => save(n.value, d.value, reader.result);
                reader.readAsDataURL(file);
            } else {
                save(n.value, d.value, null);
            }
        }

        function save(name, date, img) {
            const newTimer = {
                id: Date.now(),
                name: name,
                target: new Date(date).getTime(),
                targetISO: date, // Salviamo per l'ICS
                fired: false,
                image: img
            };
            timers.push(newTimer);
            sync();
            
            // Opzionale: Chiedi se vuole sincronizzare con calendario iOS subito
            if(confirm("Vuoi aggiungere questo allarme al calendario di iPhone per sicurezza massima?")) {
                downloadICS(name, date);
            }

            document.getElementById('name').value = '';
            document.getElementById('date').value = '';
            document.getElementById('image-input').value = '';
            render();
        }

        function deleteTimer(id, e) {
            if(e) e.stopPropagation();
            timers = timers.filter(t => t.id !== id);
            sync();
            render();
        }

        function openModal(id) {
            activeId = id;
            const t = timers.find(x => x.id === id);
            const m = document.getElementById('modal-view');
            document.getElementById('modal-title').innerText = t.name;
            m.style.backgroundImage = t.image ? `url(${t.image})` : 'none';
            m.classList.add('active');
        }

        function closeModal() {
            activeId = null;
            document.getElementById('modal-view').classList.remove('active');
        }

        function render() {
            const l = document.getElementById('list');
            l.innerHTML = timers.map(t => `
                <div class="timer-item" ${t.image ? `style="background-image:url(${t.image})"` : ''} onclick="openModal(${t.id})">
                    <div class="timer-item-overlay">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-weight:800; font-size:1.1rem;">${t.name}</span>
                            <div style="display:flex; gap:10px; align-items:center;">
                                <span class="calendar-sync" onclick="event.stopPropagation(); downloadICS('${t.name}', '${t.targetISO}')">Backup iOS</span>
                                <span onclick="deleteTimer(${t.id}, event)" style="color:var(--accent-red); font-size:1.5rem;">×</span>
                            </div>
                        </div>
                        <div class="timer-display" id="clock-${t.id}">--:--:--:--</div>
                    </div>
                </div>
            `).join('');
        }

        function tick() {
            const now = Date.now();
            timers.forEach(t => {
                const clock = document.getElementById(`clock-${t.id}`);
                const diff = t.target - now;
                const isPast = diff < 0;
                const abs = Math.abs(diff);

                const d = Math.floor(abs / 86400000).toString().padStart(2,'0');
                const h = Math.floor((abs % 86400000) / 3600000).toString().padStart(2,'0');
                const m = Math.floor((abs % 3600000) / 60000).toString().padStart(2,'0');
                const s = Math.floor((abs % 60000) / 1000).toString().padStart(2,'0');

                const str = `${isPast ? '+' : '-'} ${d}:${h}:${m}:${s}`;
                if(clock) {
                    clock.innerText = str;
                    clock.className = `timer-display ${isPast ? 'past' : 'future'}`;
                }

                if(activeId === t.id) {
                    const md = document.getElementById('modal-display');
                    md.innerText = str;
                    md.className = `modal-display ${isPast ? 'past' : 'future'}`;
                }

                if(isPast && !t.fired) {
                    if(audioEnabled) document.getElementById('beep').play().catch(()=>{});
                    if(Notification.permission === "granted") {
                        new Notification("ALLARMO!", { body: t.name });
                    }
                    t.fired = true; 
                    sync();
                }
            });
        }

        setInterval(tick, 1000);
        render();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
