<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ALLARMO - 2026 Edition</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ALLARMO">
    
    <link rel="apple-touch-icon" href="icona.png">
    
    <link rel="manifest" href="manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #05070a;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --modal-bg: #000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(239, 68, 68, 0.05) 0%, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: env(safe-area-inset-top);
        }

        h1 { 
            font-weight: 800; 
            font-size: 2.2rem; 
            letter-spacing: 0.1em; 
            margin: 0; 
            color: #fff;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: var(--accent-green);
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 5px;
            opacity: 0.8;
        }

        .input-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.65rem; 
            font-weight: 800; 
            color: #94a3b8; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
        }

        input[type="text"], input[type="datetime-local"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px;
            color: white;
            font-size: 16px;
            margin-bottom: 18px;
            outline: none;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }

        input:focus { border-color: var(--accent-green); }

        .file-input-wrapper { margin-bottom: 18px; }
        
        input[type="file"] {
            width: 100%;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        button {
            width: 100%;
            background: #fff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            color: #000;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
        }

        button:active { transform: scale(0.97); opacity: 0.9; }

        button.secondary {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid var(--glass-border);
            margin-top: 10px;
        }

        .backup-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .timer-item {
            background-color: #111;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            margin-bottom: 18px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .timer-item-overlay {
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 100%);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .timer-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .timer-name { font-weight: 600; font-size: 1.1rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .timer-display { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 1.7rem; 
            font-weight: 500; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.5); 
        }
        
        .future { color: var(--accent-green); }
        .past { color: var(--accent-red); }

        .delete-btn { 
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            z-index: 2;
        }

        .modal-view {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--modal-bg);
            background-size: cover;
            background-position: center;
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
        }
        
        .modal-view.active { display: flex; }

        .modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        .modal-close-btn {
            position: absolute;
            top: calc(20px + env(safe-area-inset-top));
            right: 20px;
            color: #fff;
            font-size: 2.5rem;
            background: none; border: none;
        }

        .modal-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 25px; text-shadow: 0 0 20px rgba(0,0,0,0.8); text-align: center; }
        .modal-display { font-family: 'JetBrains Mono', monospace; font-size: 3rem; font-weight: 500; text-shadow: 0 0 30px rgba(0,0,0,1); }

        footer { 
            margin-top: auto; 
            padding: 30px; 
            opacity: 0.5; 
            font-size: 0.7rem; 
            text-align: center; 
            letter-spacing: 0.1em;
            font-weight: 400;
        }
        
        .mastro { color: var(--accent-green); font-weight: 600; text-decoration: none; }
        
        #import-input { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ALLARMO</h1>
            <div class="subtitle">Persistenza Immersiva</div>
        </header>

        <section class="input-card">
            <label>Identificativo</label>
            <input type="text" id="name" placeholder="Es. Evento Speciale" autocomplete="off">
            
            <label>Scadenza (Picker iOS)</label>
            <input type="datetime-local" id="date" required>
            
            <label>Sfondo Visivo</label>
            <div class="file-input-wrapper">
                <input type="file" id="image-input" accept="image/*">
            </div>

            <button onclick="handleSave()">Attiva Monitoraggio</button>
            
            <div class="backup-controls">
                <button class="secondary" onclick="exportData()">Backup</button>
                <button class="secondary" onclick="document.getElementById('import-input').click()">Ripristina</button>
            </div>
            <input type="file" id="import-input" accept=".json" onchange="importData(event)">
        </section>

        <div id="list"></div>
    </div>

    <div id="modal-view" class="modal-view">
        <div class="modal-overlay"></div>
        <button class="modal-close-btn" onclick="closeModal()">×</button>
        <div id="modal-title" class="modal-title"></div>
        <div id="modal-display" class="modal-display">--:--:--:--</div>
    </div>

    <footer>
        &copy; 2026 - CREATED BY <span class="mastro">MASTRO PROGRAMMO</span>
    </footer>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const STORAGE_KEY = 'allarmo_2026_v1';
        let timers = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let activeId = null;

        function sync() { localStorage.setItem(STORAGE_KEY, JSON.stringify(timers)); }

        function handleSave() {
            const n = document.getElementById('name');
            const d = document.getElementById('date');
            const i = document.getElementById('image-input');
            
            if(!n.value || !d.value) return;

            const file = i.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => save(n.value, d.value, reader.result);
                reader.readAsDataURL(file);
            } else {
                save(n.value, d.value, null);
            }
        }

        function save(name, date, img) {
            timers.push({
                id: Date.now(),
                name: name,
                target: new Date(date).getTime(),
                fired: false,
                image: img
            });
            sync();
            document.getElementById('name').value = '';
            document.getElementById('date').value = '';
            document.getElementById('image-input').value = '';
            render();
        }

        function deleteTimer(id, e) {
            if(e) e.stopPropagation();
            timers = timers.filter(t => t.id !== id);
            sync();
            if(id === activeId) closeModal();
            render();
        }

        function openModal(id) {
            activeId = id;
            const t = timers.find(x => x.id === id);
            const m = document.getElementById('modal-view');
            document.getElementById('modal-title').innerText = t.name;
            m.style.backgroundImage = t.image ? `url(${t.image})` : 'none';
            m.classList.add('active');
        }

        function closeModal() {
            activeId = null;
            document.getElementById('modal-view').classList.remove('active');
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(timers)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'allarmo_2026_backup.json';
            a.click();
        }

        function importData(e) {
            const r = new FileReader();
            r.onload = (ev) => {
                try {
                    timers = JSON.parse(ev.target.result);
                    sync(); render();
                } catch(e) { alert("File non valido"); }
            };
            r.readAsText(e.target.files[0]);
        }

        function render() {
            const l = document.getElementById('list');
            l.innerHTML = timers.map(t => `
                <div class="timer-item" ${t.image ? `style="background-image:url(${t.image})"` : ''} onclick="openModal(${t.id})">
                    <div class="timer-item-overlay">
                        <div class="timer-header">
                            <span class="timer-name">${t.name}</span>
                            <button class="delete-btn" onclick="deleteTimer(${t.id}, event)">×</button>
                        </div>
                        <div class="timer-display" id="clock-${t.id}">--:--:--:--</div>
                    </div>
                </div>
            `).join('');
        }

        function tick() {
            const now = Date.now();
            timers.forEach(t => {
                const clock = document.getElementById(`clock-${t.id}`);
                const diff = t.target - now;
                const isPast = diff < 0;
                const abs = Math.abs(diff);

                const d = Math.floor(abs / 86400000).toString().padStart(2,'0');
                const h = Math.floor((abs % 86400000) / 3600000).toString().padStart(2,'0');
                const m = Math.floor((abs % 3600000) / 60000).toString().padStart(2,'0');
                const s = Math.floor((abs % 60000) / 1000).toString().padStart(2,'0');

                const str = `${isPast ? '+' : '-'} ${d}:${h}:${m}:${s}`;
                if(clock) {
                    clock.innerText = str;
                    clock.className = `timer-display ${isPast ? 'past' : 'future'}`;
                }

                if(activeId === t.id) {
                    const md = document.getElementById('modal-display');
                    md.innerText = str;
                    md.className = `modal-display ${isPast ? 'past' : 'future'}`;
                }

                if(isPast && !t.fired) {
                    document.getElementById('beep').play().catch(()=>{});
                    if(Notification.permission === "granted") new Notification("ALLARMO!", { body: t.name });
                    t.fired = true; sync();
                }
            });
        }

        setInterval(tick, 1000);
        render();
        if ("Notification" in window) Notification.requestPermission();

        // SERVICE WORKER AUTOMATICO
        if ('serviceWorker' in navigator) {
            const sw = `self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`;
            const b = new Blob([sw], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(b));
        }
    </script>
</body>
</html>
